<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WhatEat - Restaurant Picker</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <!-- Plain JS — no JSX, load fine everywhere -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/icons.js"></script>
</head>
<body>
    <div id="root"></div>

    <script>
        // ── App segments in load order ──────────────────────────────────
        // Edit individual files without touching the others.
        // All segments share the same scope — they are concatenated into
        // one string, Babel-transformed once, then executed.
        var APP_SEGMENTS = [
            'js/app-state.js',       // React state, hooks, all functions
            'js/view-result.js',     // Result screen (after spinning)
            'js/view-main.js',       // Main screen: header, filters, spinner, stats
            'js/view-list.js',       // Restaurant list / map + FAB button
            'js/modal-add.js',       // Add Restaurant modal
            'js/modal-discover.js',  // AI Discover modal
            'js/app-end.js',         // Warnings, toast, animations, ReactDOM.render
        ];

        Promise.all(APP_SEGMENTS.map(function(url) {
            return fetch(url).then(function(r) {
                if (!r.ok) throw new Error('Failed to load ' + url + ' (' + r.status + ')');
                return r.text();
            });
        }))
        .then(function(chunks) {
            var fullCode = chunks.join('\n');
            var transformed = Babel.transform(fullCode, { presets: ['react'] }).code;
            var script = document.createElement('script');
            script.text = transformed;
            document.body.appendChild(script);
        })
        .catch(function(err) {
            document.getElementById('root').innerHTML =
                '<div style="padding:40px;font-family:sans-serif;color:#c0392b;max-width:500px;margin:0 auto">' +
                '<h2>⚠️ Load Error</h2>' +
                '<pre style="background:#fff0f0;padding:16px;border-radius:8px;white-space:pre-wrap;font-size:13px">' +
                err.message + '</pre>' +
                '<p style="color:#666;font-size:14px">Make sure you are using <strong>VS Code Live Server</strong> or <strong>GitHub Pages</strong> — not opening the file directly.</p>' +
                '</div>';
        });
    </script>
</body>
</html>
